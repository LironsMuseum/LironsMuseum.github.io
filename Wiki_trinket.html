<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wiki Toon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f6f6;
}

.content{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:20px;
  border:1px solid #ccc;
}

h1{
  margin-top:0;
}
</style>
</head>

<body>

<div class="content">
  <h1 id="title">Carregando...</h1>
  <p id="description"></p>
</div>

<script>
// Pega variável da URL
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

// Banco de dados fake
const database = {
  "Plush Liron": {
    title: "Uma pelúcia do mascote! Liron!",
    description: "Este item oferece um desconto de 50% na loja do Liron dentro do jogo, além de aumentar a probabilidade de aparição de Twisteds Mains em 1% a cada novo andar.
   },
  "Noah": {
    title: "Noah",
    description: "Noah é um personagem secundário com passado obscuro."
  }
};

// Verifica se existe
if(database[name]){
  document.getElementById("title").textContent = database[name].title;
  document.getElementById("description").textContent = database[name].description;
}else{
  document.getElementById("title").textContent = "Personagem não encontrado";
  document.getElementById("description").textContent = "Esse toon ainda não existe na wiki.";
}
</script>

</body>
</html>
