<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Liron Wiki - Toon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===============================
   🌙 DARK MODE BASE
================================ */

body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#0f1115;
  color:#e6e6e6;
}

.container{
  max-width:1000px;
  margin:40px auto;
  background:#181c22;
  padding:30px;
  border-radius:14px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* ===============================
   🎨 TÍTULO
================================ */

h1{
  margin-top:0;
  font-size:32px;
}

/* ===============================
   🧩 SEÇÕES
================================ */

.section{
  margin-top:35px;
}

.section-title{
  font-size:20px;
  padding-bottom:8px;
  border-bottom:1px solid #2b313a;
  margin-bottom:15px;
  color:#ffb347;
}

/* ===============================
   ⭐ ESTRELAS
================================ */

.star{
  color:#444;
  font-size:18px;
}

.star.filled{
  color:#ff9800;
}

/* ===============================
   📊 STATUS
================================ */

.stat-row{
  margin-bottom:12px;
}

.hidden-stat{
  opacity:0.6;
  font-size:14px;
}

/* ===============================
   🧠 HABILIDADES
================================ */

.skill-box{
  background:#20252d;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
  border-left:4px solid #ff9800;
}

/* ===============================
   💬 FALAS
================================ */

.dialogue{
  background:#20252d;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  font-style:italic;
}

.toggle-btn{
  margin-top:10px;
  background:#ff9800;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  color:#111;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1 id="name">Carregando...</h1>
<div id="classBox"></div>

<div class="section">
<div class="section-title">Status</div>
<div id="stats"></div>
</div>

<div class="section">
<div class="section-title">Status Ocultos</div>
<div id="hiddenStats"></div>
</div>

<div class="section">
<div class="section-title">Habilidades</div>
<div id="skills"></div>
</div>

<div class="section">
<div class="section-title">Falas</div>
<div id="dialogues"></div>
</div>

</div>

<script>

/* ===============================
   🎨 CLASSES
================================ */

const classSystem = {
  "A-Common": { color:"#e53935" },
  "B-Uncommon": { color:"#fb8c00" },
  "C-Rare": { color:"#fdd835" },
  "D-Main": { color:"#43a047" },
  "F-Lead": { color:"#8e24aa" },
  "Sub-H-Primary": { color:"#ff9800" }
};

/* ===============================
   📚 DATABASE (EXEMPLO)
================================ */

const database = {
  "Liron Firebloom": {
    class:"Sub-H-Primary",

    stats:{
      "Skill Check":5,
      "Movement Speed":5,
      "Stamina":5,
      "Extraction Speed":5,
      "Stealth":5
    },

    hiddenStats:{
      "DenseSnowResis":50,
      "SwimSpeed":50,
      "OverGrownResis":60,
      "HauntResis":50,
      "BadLuckCounter":50,
      "IchorPuddleResis":50,
      "BlackoutVisionCamp":50,
      "BlackoutGlow":50
    },

    skills:[
      {name:"Motivational Pressure", type:"Ativa", desc:"Aumenta extração temporariamente."},
      {name:"Burning Presence", type:"Passiva", desc:"Aliados próximos ganham +1 stamina."},
      {name:"Primary Authority", type:"Passiva", desc:"Imune a efeitos de medo."}
    ],

    dialogues:{
      active:[
        "...",
        "Eu deveria voltar a minha loja..."
        "ugh... eu desprezo a presença desses vermes..."
      ],
      interaction:[
        'Liron: "... só compra logo."',
        'Lunaris: "..."',
        'Liron: "Tá me ouvindo? Compra."',
        'Lunaris: "..."'
      ]
    }
  }
};

/* ===============================
   ⭐ FUNÇÃO ESTRELAS
================================ */

function generateStars(value){
  let starsHTML = "";
  for(let i=1;i<=5;i++){
    if(i <= value){
      starsHTML += `<span class="star filled">★</span>`;
    }else{
      starsHTML += `<span class="star">★</span>`;
    }
  }
  return starsHTML;
}

/* ===============================
   ⚙️ RENDER
================================ */

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(database[name]){

  const toon = database[name];

  document.getElementById("name").textContent = name;
  document.getElementById("name").style.color =
    classSystem[toon.class]?.color || "#fff";

  document.getElementById("classBox").innerHTML =
    `<strong>Classe:</strong> ${toon.class}`;

  // STATUS VISÍVEIS
  const statsContainer = document.getElementById("stats");
  for(const stat in toon.stats){
    statsContainer.innerHTML += `
      <div class="stat-row">
        ${stat}: ${generateStars(toon.stats[stat])}
      </div>
    `;
  }

  // STATUS OCULTOS
  const hiddenContainer = document.getElementById("hiddenStats");
  for(const stat in toon.hiddenStats){
    hiddenContainer.innerHTML += `
      <div class="hidden-stat">
        ${stat}: ${toon.hiddenStats[stat]}%
      </div>
    `;
  }

  // HABILIDADES
  const skillContainer = document.getElementById("skills");
  toon.skills.forEach(skill=>{
    skillContainer.innerHTML += `
      <div class="skill-box">
        <strong>${skill.name}</strong> (${skill.type})<br>
        ${skill.desc}
      </div>
    `;
  });

  // FALAS
  const dialogueContainer = document.getElementById("dialogues");

  dialogueContainer.innerHTML += "<strong>Ao usar habilidade ativa:</strong>";
  toon.dialogues.active.forEach(line=>{
    dialogueContainer.innerHTML += `<div class="dialogue">"${line}"</div>`;
  });

  dialogueContainer.innerHTML += "<br><strong>Interações:</strong>";
  toon.dialogues.interaction.forEach(line=>{
    dialogueContainer.innerHTML += `<div class="dialogue">${line}</div>`;
  });

}else{
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Toon não encontrado.</h1>";
}

</script>

</body>
</html>
